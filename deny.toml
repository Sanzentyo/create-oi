# cargo-deny policy for create-oi workspace
# Project license: MIT OR Apache-2.0 (dual)
# Upstream attribution: libcreate (BSD-3-Clause) — see NOTICE
#
# License policy:
#   GREEN  – MIT, Apache-2.0, BSD-*, Unlicense, CC0, Zlib, BSL-1.0,
#             Unicode-3.0, MIT-0  (all permissive)
#   YELLOW – MPL-2.0 (serialport only): weak/file-scoped copyleft.
#             Linking is permitted; modifications to MPL files must be shared.
#   RED    – GPL, LGPL, AGPL, CDDL and any other strong copyleft not listed
#             above are implicitly denied by the allow list.

# ---------------------------------------------------------------------------
# Graph
# ---------------------------------------------------------------------------
[graph]
# Check all workspace members (including create-oi-dora, create-oi-embassy).
all-features = false
no-default-features = false

[output]
feature-depth = 1

# ---------------------------------------------------------------------------
# Advisories  (security – run separately with `cargo deny check advisories`)
# ---------------------------------------------------------------------------
[advisories]
ignore = []

# ---------------------------------------------------------------------------
# Licenses
# ---------------------------------------------------------------------------
[licenses]
# Only permissive licenses are allowed for this MIT OR Apache-2.0 project.
# Anything NOT in this list is implicitly denied (GPL, LGPL, AGPL, CDDL, …).
allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Unlicense",
    "CC0-1.0",
    "Unicode-3.0",
    "Zlib",
    "BSL-1.0",   # Boost Software License – permissive (ryu)
]
confidence-threshold = 0.8

# Per-crate exceptions for licenses not in the allow list above.
exceptions = [
    # serialport = "4.9" — MPL-2.0 (Mozilla Public License 2.0)
    # STATUS: YELLOW
    # MPL-2.0 is file-scoped copyleft: you must publish changes to the
    # MPL-licensed source files, but linking with other-licensed code
    # (including MIT/Apache-2.0 crates) is explicitly allowed.
    # This crate is used as-is (no MPL file modifications), so binary
    # distribution under MIT OR Apache-2.0 is acceptable.
    # Reference: https://www.mozilla.org/en-US/MPL/2.0/FAQ/
    { allow = ["MPL-2.0"], crate = "serialport" },
]

# Notes on OR-expression licenses that pass via the allow list above:
#   • unescaper  GPL-3.0/MIT          → MIT chosen             (GREEN via OR)
#   • r-efi      MIT OR Apache-2.0 OR LGPL-2.1-or-later
#                                     → MIT/Apache-2.0 chosen  (GREEN via OR)
#   • uhlc       EPL-2.0 OR Apache-2.0 → Apache-2.0 chosen    (GREEN via OR)

[licenses.private]
ignore = false
registries = []

# ---------------------------------------------------------------------------
# Bans  (duplicate crate versions + explicitly banned crates)
# ---------------------------------------------------------------------------
[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
deny = []

# Skip older versions that coexist with current versions due to different
# ecosystem generations pulling them in transitively.  These cannot be
# resolved without upstream bumps in dora-node-api / embedded-hal / etc.
skip = [
    # thiserror: workspace uses v2; dora-* ecosystem still requires v1
    { crate = "thiserror@1.0.69",      reason = "dora-* ecosystem requires thiserror v1; workspace uses v2" },
    { crate = "thiserror-impl@1.0.69", reason = "dora-* ecosystem requires thiserror-impl v1; workspace uses v2" },
    # embedded-hal: v0.2 (legacy HAL) and v1.0 (stable HAL) are incompatible API generations
    { crate = "embedded-hal@0.2.7",    reason = "legacy HAL API required by some transitive deps; v1.0 is the current target" },
    # nb: follows embedded-hal versioning (0.1 legacy, 1.x current)
    # Note: nb@0.1.3 may or may not be present depending on resolved features
    # rand / getrandom / rand_core / rand_chacha: rand 0.8 (older) vs 0.9 (current)
    { crate = "rand@0.8.6",            reason = "rand 0.8 pulled by older transitive deps; workspace targets rand 0.9" },
    { crate = "rand_chacha@0.3.1",     reason = "rand_chacha 0.3 pulled by rand 0.8 transitive deps" },
    { crate = "rand_core@0.6.4",       reason = "rand_core 0.6 pulled by rand 0.8 transitive deps" },
    { crate = "getrandom@0.2.17",      reason = "getrandom 0.2 pulled by rand 0.8 transitive deps" },
    { crate = "getrandom@0.3.4",       reason = "getrandom 0.3 pulled by rand 0.9 transitive deps" },
    # r-efi: two versions from different sub-ecosystems
    { crate = "r-efi@5.3.0",           reason = "older r-efi version pulled by transitive WASI/UEFI deps" },
    # opentelemetry: 0.23 pulled by dora-metrics, 0.29 by newer opentelemetry-otlp
    { crate = "opentelemetry@0.23.0",      reason = "dora-metrics requires opentelemetry 0.23; main deps target 0.29" },
    { crate = "opentelemetry_sdk@0.23.0",  reason = "dora-metrics requires opentelemetry_sdk 0.23; main deps target 0.29" },
    # ordered-float: 2.x pulled by dora-related flatbuffers/arrow deps
    { crate = "ordered-float@2.10.1",  reason = "dora/arrow ecosystem requires ordered-float 2.x" },
    # bitflags: 1.x pulled by older transitive deps
    { crate = "bitflags@1.3.2",        reason = "bitflags 1.x required by older transitive deps; workspace uses 2.x" },
    # hashbrown: multiple versions from std/indexmap/ahash each pinning their own
    { crate = "hashbrown@0.12.3",      reason = "indexmap 1.x requires hashbrown 0.12" },
    { crate = "hashbrown@0.15.5",      reason = "indexmap 2.x / ahash ecosystem requires hashbrown 0.15" },
    # indexmap: 1.x pulled by older ecosystem (arrow, dora), 2.x is current
    { crate = "indexmap@1.9.3",        reason = "arrow/dora ecosystem requires indexmap 1.x; workspace targets 2.x" },
    # tower: 0.4 (older) pulled by tonic / dora; 0.5 is current
    { crate = "tower@0.4.13",          reason = "tonic/dora ecosystem requires tower 0.4; workspace targets 0.5" },
    # windows / windows-*: many sub-crate versions from different ecosystem generations
    { crate = "windows@0.34.0",                reason = "pulled by older windows ecosystem transitive deps" },
    { crate = "windows-core@0.57.0",           reason = "pulled by windows 0.57 transitive deps" },
    { crate = "windows-implement@0.57.0",      reason = "pulled by windows 0.57 transitive deps" },
    { crate = "windows-interface@0.57.0",      reason = "pulled by windows 0.57 transitive deps" },
    { crate = "windows-result@0.1.2",          reason = "pulled by windows 0.57 transitive deps" },
    { crate = "windows-sys@0.48.0",            reason = "pulled by older ecosystem (rustix 0.38, nix 0.26, etc.)" },
    { crate = "windows-sys@0.52.0",            reason = "pulled by mid-generation ecosystem deps" },
    { crate = "windows-sys@0.59.0",            reason = "pulled by rustix 0.38 / dora-core transitive deps" },
    { crate = "windows-targets@0.48.5",        reason = "pulled by windows-sys 0.48 transitive deps" },
    { crate = "windows_aarch64_gnullvm@0.48.5",reason = "pulled by windows-sys 0.48 transitive deps" },
    { crate = "windows_aarch64_msvc@0.34.0",   reason = "pulled by windows 0.34 transitive deps" },
    { crate = "windows_aarch64_msvc@0.48.5",   reason = "pulled by windows-sys 0.48 transitive deps" },
    { crate = "windows_i686_gnu@0.34.0",       reason = "pulled by windows 0.34 transitive deps" },
    { crate = "windows_i686_gnu@0.48.5",       reason = "pulled by windows-sys 0.48 transitive deps" },
    { crate = "windows_i686_msvc@0.34.0",      reason = "pulled by windows 0.34 transitive deps" },
    { crate = "windows_i686_msvc@0.48.5",      reason = "pulled by windows-sys 0.48 transitive deps" },
    { crate = "windows_x86_64_gnu@0.34.0",     reason = "pulled by windows 0.34 transitive deps" },
    { crate = "windows_x86_64_gnu@0.48.5",     reason = "pulled by windows-sys 0.48 transitive deps" },
    { crate = "windows_x86_64_gnullvm@0.48.5", reason = "pulled by windows-sys 0.48 transitive deps" },
    { crate = "windows_x86_64_msvc@0.34.0",    reason = "pulled by windows 0.34 transitive deps" },
    { crate = "windows_x86_64_msvc@0.48.5",    reason = "pulled by windows-sys 0.48 transitive deps" },
    # linux-raw-sys: 0.4 pulled by rustix 0.38; 0.12 is used by rustix 1.x
    { crate = "linux-raw-sys@0.4.15",  reason = "rustix 0.38 requires linux-raw-sys 0.4; rustix 1.x uses 0.12" },
    # rustix: 0.38 pulled by older ecosystem (mio-serial etc.); 1.x is current
    { crate = "rustix@0.38.44",        reason = "mio-serial/older ecosystem requires rustix 0.38; workspace targets 1.x" },
    # nix: three versions from different generations of unix-api deps
    { crate = "nix@0.23.2",            reason = "pulled by libudev-sys / older serial ecosystem" },
    { crate = "nix@0.26.4",            reason = "pulled by mid-generation deps" },
    # wit-bindgen: two generations from wasmtime ecosystem
    { crate = "wit-bindgen@0.46.0",    reason = "pulled by one wasm ecosystem generation" },
]
skip-tree = []

# ---------------------------------------------------------------------------
# Sources
# ---------------------------------------------------------------------------
[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[sources.allow-org]
github = []
gitlab = []
bitbucket = []
